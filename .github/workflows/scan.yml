name: Scan blockchain & update Redis

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes  (change to "*/30 * * * *" for every 30 min)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run veGNET scanner
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          RPC_URL:                  ${{ secrets.RPC_URL }}
        run: npx tsx scripts/scan-and-update.ts

      - name: Run vesting scanner
        env:
          UPSTASH_REDIS_REST_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          RPC_URL:                  ${{ secrets.RPC_URL }}
        run: npx tsx scripts/scan-vesting.ts
